<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Studio Skin</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --azul-verde: #4384a4; 
            --blanco: #ffffff;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 1. Header */
        header {
            background-color: var(--blanco);
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        .logo {
            max-width: 200px;
            height: auto;
        }

        /* 2. CONFIGURACIÓN GENERAL DE CARRUSELES */
        .carrusel-section, .carrusel-section2 {
            background-color: var(--azul-verde);
            padding: 20px 10px;
            text-align: center;
        }
        .carrusel-container, .carrusel-container2 {
            display: flex;
            overflow-x: auto;
            gap: 15px; /* Un poco más de espacio entre fotos */
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* AJUSTES ESPECÍFICOS CARRUSEL 1 (Imágenes Largas/Rectangulares) */
        .carrusel-container img {
            width: 250px; /* Ancho fijo para las fotos largas */
            height: auto; /* La altura se ajusta automáticamente para mantener la proporción rectangular */
            object-fit: contain; /* Asegura que la imagen rectangular se vea completa */
            border-radius: 10px;
            flex-shrink: 0;
            background-color: #f9f9f9; /* Fondo suave opcional para ordenar visualmente si las alturas varían */
        }

        /* AJUSTES ESPECÍFICOS CARRUSEL 2 (Imágenes Cuadradas) */
        .carrusel-container2 img {
            width: 300px; /* Ancho y alto iguales para hacerlas cuadradas */
            height: 300px;
            object-fit: cover; /* Llena el cuadrado perfectamente sin deformar */
            object-position: center;
            border-radius: 10px;
            flex-shrink: 0;
        }

        /* 3. Redes Sociales */
        .social-section {
            background-color: var(--blanco);
            padding: 50px 20px;
            text-align: center;
        }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        .social-icons a {
            font-size: 45px;
            text-decoration: none;
            transition: transform 0.3s ease;
        }
        .social-icons a:hover { transform: scale(1.2); }
        .fa-facebook { color: #1877F2; }
        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }

        .save-contact {
            margin-top: 10px;
            padding: 15px 30px;
            border: 2px solid var(--azul-verde);
            border-radius: 50px;
            display: inline-block;
            color: var(--azul-verde);
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        /* 4. SECCIÓN DE UBICACIONES */
        .ubicaciones-section {
            background-color: #f4f4f4;
            padding: 5px 5px;
            display: flex;
            justify-content: center;
        }
        .card-split {
            background-color: white;
            display: grid;
            grid-template-columns: 1fr 1fr; 
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }
        .location-part {
            padding: 30px;
            text-align: center;
        }
        .location-part:first-child { border-right: 1px solid #eee; }

        .btn-location {
            background-color: var(--azul-verde);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 15px;
            text-decoration: none;
            display: inline-block;
        }

        /* 5. CUADRO FINAL COMPLETE */
        .footer-final {
            background-color: #f4f4f4;
            padding: 20px;
            text-align: center;
        }
        .card-teal-final {
            background-color: var(--azul-verde);
            color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-size: 12px;
        }
        .card-teal-final p { margin: 5px 0; }

        /* Ajustes para Celular */
        @media (max-width: 768px) {
            .card-split { grid-template-columns: 1fr; }
            .location-part:first-child { border-right: none; border-bottom: 1px solid #eee; }
            
            /* Ajuste de carruseles en móvil */
            .carrusel-container img { width: 300px; } /* Un poco más estrechas en móvil */
            .carrusel-container2 img { width: 280px; height: 280px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="Imagenes/logo.png" alt="Logo" class="logo">
    </header>

    <section class="carrusel-section">
        <div class="carrusel-container">
            <img src="Imagenes/1.jpg" alt="Foto Larga 1">
            <img src="Imagenes/2.jpg" alt="Foto Larga 2">
            <img src="Imagenes/3.jpg" alt="Foto Larga 3">
            <img src="Imagenes/4.jpg" alt="Foto Larga 4">
            <img src="Imagenes/5.jpg" alt="Foto Larga 5">
            <img src="Imagenes/6.jpg" alt="Foto Larga 6">
            <img src="Imagenes/7.jpg" alt="Foto Larga 7">
        </div>
    </section>

    <section class="social-section">
        <div class="social-icons">
            <a href="https://www.facebook.com/share/18hoRBZkEM/" target="_blank"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://wa.me/526391928860" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="https://www.instagram.com/md_studioskin?igsh=MXVINzB4bGRjMTFzMQ%3D%3D&utm_source=qr" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        </div>
        <div class="save-contact" id="btnDescargar">
            <i class="fa-solid fa-user-plus"></i> Guardar contacto
        </div>
    </section>

    <section class="ubicaciones-section">
        <div class="card-split">
            <div class="location-part">
                <h3>Delicias</h3>
                <a href="https://maps.app.goo.gl/JhenguJMzocGqBVB9?g_st=iw" target="_blank" class="btn-location">Ubicación</a>
            </div>
            <div class="location-part">
                <h3>Chihuahua</h3>
                <a href="https://maps.app.goo.gl/C68ic1LPzZqjK2Ft8?g_st=iw" target="_blank" class="btn-location">Ubicación</a>
            </div>
        </div>
    </section>

    <section class="carrusel-section2">
        <div class="carrusel-container2">
            <img src="Imagenes/1c.jpg" alt="Foto Cuadrada 1">
            <img src="Imagenes/2c.jpg" alt="Foto Cuadrada 2">
            <img src="Imagenes/3c.jpg" alt="Foto Cuadrada 3">
            <img src="Imagenes/4c.jpg" alt="Foto Cuadrada 4">
            <img src="Imagenes/5c.jpg" alt="Foto Cuadrada 5">
            <img src="Imagenes/6c.jpg" alt="Foto Cuadrada 6">
            <img src="Imagenes/7c.jpg" alt="Foto Cuadrada 7">
        </div>
    </section>

    <section class="footer-final">
        <div class="card-teal-final">
            <p>©KonecTap</p>
            <p>VIBB</p>
        </div>
    </section>

    <script>
        document.getElementById('btnDescargar').addEventListener('click', function() {
            const contacto = "BEGIN:VCARD\nVERSION:3.0\nFN:MD Studio Skin\nTEL;TYPE=CELL:6391928860\nEND:VCARD";
            const blob = new Blob([contacto], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            a.href = url;
            a.download = "MD_Studio_Skin.vcf";
            document.body.appendChild(a);
            a.click();
            
            // Limpieza inmediata para evitar que el navegador se quede en estado de descarga
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        });
    </script>

</body>
</html>
